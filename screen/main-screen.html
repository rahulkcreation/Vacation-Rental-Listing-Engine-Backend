<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Type</title>
    <style>
        :root {
            --am-d-primary: #F15E74;
            --am-d-secondary: #2C3E50;
            --am-d-bg: #FAFAFA;
            --am-d-text: #000000;
            --am-d-success: #16a34a;
            --am-d-warning: #f59e0b;
            --am-d-error: #ea0124;
            --am-d-white: #ffffff;
            --am-d-card-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            --am-d-border-light: #e9eef3;
            --am-d-border-default: #e2e8f0;
            --am-d-grey-light-text: #5a6e7c;
            --am-d-light-yellow-bg: #fff2dc;
            --am-d-light-red-bg: #ffe6ea;
            --am-d-light-green-bg: #d5ffe5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--am-d-bg);
            color: var(--am-d-text);
            line-height: 1.6;
            min-height: 100vh;
        }

       

      
        .leb-main-container {
            max-width: 1400px;
            margin: 20px auto;
            position: relative;
            z-index: 1;
            width: 96%;
        }

        .leb-header-section {
            margin-bottom: 30px;
        }

        .leb-header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            background-color: var(--am-d-white);
            padding: 1rem;
            border-radius: 1rem;
            box-shadow: var(--am-d-card-shadow);
        }

        .leb-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .leb-header-icon-box {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--am-d-primary), #e8445e);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(241, 94, 116, 0.25);
        }

        .leb-header-icon-svg {
            width: 24px;
            height: 24px;
            color: var(--am-d-white);
        }

        .leb-page-title {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--am-d-secondary);
            letter-spacing: -0.03em;
            line-height: 1.2;
        }

        button.add-type-btn {
            background-color: var(--am-d-primary);
            padding: 0.5rem 1rem;
            border-radius: 1rem;
            border: solid 1px;
            border-color: var(--am-d-border-light);
            color: var(--am-d-white);
            box-shadow: var(--am-d-card-shadow);
            cursor: pointer;
        }

        .leb-search-section {
            margin-bottom: 24px;
        }

        .leb-search-bar-wrapper {
            background-color: var(--am-d-white);
            border-radius: 14px;
            padding: 6px 8px 6px 22px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--am-d-card-shadow);
            border: 2px solid var(--am-d-border-light);
            transition: all 0.3s ease;
        }

        .leb-search-bar-wrapper.leb-search-focused {
            border-color: var(--am-d-primary);
        }

        .leb-search-icon {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .leb-search-icon-svg {
            width: 20px;
            height: 20px;
            color: var(--am-d-grey-light-text);
            transition: color 0.3s ease;
        }

        .leb-search-bar-wrapper.leb-search-focused .leb-search-icon-svg {
            color: var(--am-d-primary);
        }

        .leb-search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.9375rem;
            color: var(--am-d-text);
            background: transparent;
            font-family: inherit;
            padding: 10px 0;
        }

        .leb-search-input::placeholder {
            color: var(--am-d-grey-light-text);
            font-weight: 400;
        }

        .leb-search-clear-btn {
            display: none;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background-color: #f1f3f5;
            color: var(--am-d-grey-light-text);
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .leb-search-clear-btn:hover {
            background-color: var(--am-d-border-default);
            color: var(--am-d-secondary);
        }

        .leb-search-clear-btn.leb-search-clear-visible {
            display: flex;
        }

        .leb-search-clear-svg {
            width: 16px;
            height: 16px;
        }

        .leb-table-section {
            background: var(--am-d-white);
            border-radius: 18px;
            box-shadow: var(--am-d-card-shadow);
            border: 1px solid var(--am-d-border-light);
            overflow: hidden;
        }

        .leb-table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            width: 100%;
        }

        .leb-t-datas {
            margin: 10px;
            padding: 10px 15px;
            border: solid 1px;
            border-color: var(--am-d-border-light);
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        .leb-t-data-entry {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 1rem;
        }

        .leb-data-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--am-d-grey-light-text);
        }

        .leb-data-entry {
            font-size: 0.8rem;
            font-weight: 400;
        }

        .leb-t-data-action {
            margin-top: 5px;
            border: solid 1px;
            border-width: 1px 0px 0px 0px;
            padding-top: 5px;
            border-color: var(--am-d-border-light);
            display: flex;
            justify-content: flex-end;
        }

        .leb-data-status {
            background-color: var(--am-d-light-yellow-bg);
            padding: 4px 20px;
            border-radius: 100rem;
            color: var(--am-d-warning);
            border-color: var(--am-d-warning);
            border: solid 1px;
        }

        .leb-data-btn {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            align-items: center;
            gap: 5px;
            background-color: var(--am-d-primary);
            border-color: var(--am-d-primary);
            color: var(--am-d-white);
            border-radius: 100rem;
            padding: 4px 20px;
        }

        .leb-action-btn-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .leb-pagination-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-top: 1px solid var(--am-d-border-light);
            flex-wrap: wrap;
            gap: 12px;
        }

        .leb-pagination-text {
            font-size: 0.8125rem;
            color: var(--am-d-grey-light-text);
        }

        .leb-pagination-controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .leb-page-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid var(--am-d-border-light);
            background-color: var(--am-d-white);
            color: var(--am-d-grey-light-text);
            font-size: 0.8125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .leb-page-btn-active {
            background-color: var(--am-d-primary);
            border-color: var(--am-d-primary);
            color: var(--am-d-white);
        }

        .leb-page-btn-disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .leb-page-btn-svg {
            width: 16px;
            height: 16px;
        }

        @media (width <=420px) {
            .leb-page-title {
                font-size: 1.4rem;
            }

            .leb-header-icon-box {
                width: 40px;
                height: 40px;
            }

            .leb-header-right {
                flex-grow: 1;
            }

            button.add-type-btn {
                display: flex;
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <div class="leb-bg-decoration">
        <div class="leb-bg-orb-1"></div>
        <div class="leb-bg-orb-2"></div>
    </div>

    <div class="leb-main-container">

        <div class="leb-header-section">
            <div class="leb-header-top">
                <div class="leb-header-left">
                    <div class="leb-header-icon-box">
                        <svg class="leb-header-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18"></path>
                            <path d="M2 22v-4a2 2 0 0 1 2-2h2"></path>
                            <path d="M18 16h2a2 2 0 0 1 2 2v4"></path>
                            <line x1="10" y1="6" x2="10" y2="6.01"></line>
                            <line x1="14" y1="6" x2="14" y2="6.01"></line>
                            <line x1="10" y1="10" x2="10" y2="10.01"></line>
                            <line x1="14" y1="10" x2="14" y2="10.01"></line>
                            <line x1="10" y1="14" x2="10" y2="14.01"></line>
                            <line x1="14" y1="14" x2="14" y2="14.01"></line>
                            <line x1="2" y1="22" x2="22" y2="22"></line>
                        </svg>
                    </div>
                    <h1 class="leb-page-title">Manage Type</h1>
                </div>

                <div class="leb-header-right">
                    <button class="add-type-btn">Add New Type</button>
                </div>
            </div>
        </div>

        <div class="leb-search-section">
            <div class="leb-search-bar-wrapper" id="leb-search-bar-wrapper">
                <span class="leb-search-icon">
                    <svg class="leb-search-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </span>
                <input type="text" class="leb-search-input"
                    placeholder="Search by name, email, or phone (min 3 chars)..." id="leb-search-input"
                    autocomplete="off">
                <button class="leb-search-clear-btn" id="leb-search-clear-btn" onclick="lebClearSearch()">
                    <svg class="leb-search-clear-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>

        <div class="leb-table-section">

            <div class="leb-table-scroll">

                <div class="leb-table-mobile">
                    <div class="leb-t-datas">
                        <div class="leb-t-data-entry">
                            <div class="leb-data-label">ID</div>
                            <div class="leb-data-entry">1</div>
                        </div>

                        <div class="leb-t-data-entry">
                            <div class="leb-data-label">Name</div>
                            <div class="leb-data-entry">Appartment</div>
                        </div>

                        <div class="leb-t-data-entry">
                            <div class="leb-data-label">Slug</div>
                            <div class="leb-data-entry">/appartment</div>
                        </div>

                        <div class="leb-t-data-entry">
                            <div class="leb-data-label">Date/Time</div>
                            <div class="leb-data-entry">March 28, 2026 9:41 PM</div>
                        </div>

                        <div class="leb-t-data-entry leb-t-data-action">
                            <div class="leb-data-btn leb-data-entry">
                                <svg class="leb-action-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                Edit
                            </div>
                        </div>
                    </div>

                     <div class="leb-t-datas">
                        <div class="leb-t-data-entry">
                            <div class="leb-data-label">
                                ID
                            </div>
                            <div class="leb-data-entry">
                                2
                            </div>
                        </div>

                        <div class="leb-t-data-entry">
                            <div class="leb-data-label">
                                Name
                            </div>
                            <div class="leb-data-entry">
                                Flat
                            </div>
                        </div>

                        <div class="leb-t-data-entry">
                            <div class="leb-data-label">
                                Slug
                            </div>
                            <div class="leb-data-entry">
                                /flat
                            </div>
                        </div>

                        <div class="leb-t-data-entry">
                            <div class="leb-data-label">
                                Date/Time
                            </div>
                            <div class="leb-data-entry">
                                March 28, 2026 9:41 PM
                            </div>
                        </div>

                        <div class="leb-t-data-entry leb-t-data-action">

                            <div class="leb-data-btn leb-data-entry">
                                <svg class="leb-action-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                Edit
                            </div>

                        </div>
                    </div>
                </div>
            </div>

            <div class="leb-pagination-bar">
                <span class="leb-pagination-text" id="leb-pagination-text">Showing 1-1 of 1</span>
                <div class="leb-pagination-controls">
                    <button class="leb-page-btn leb-page-btn-disabled" disabled>
                        <svg class="leb-page-btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <button class="leb-page-btn leb-page-btn-active">1</button>
                    <button class="leb-page-btn leb-page-btn-disabled" disabled>
                        <svg class="leb-page-btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        var lebSearchInputElement = document.getElementById('leb-search-input');
        var lebClearBtn = document.getElementById('leb-search-clear-btn');
        var lebWrapper = document.getElementById('leb-search-bar-wrapper');

        function lebClearSearch() {
            lebSearchInputElement.value = "";
            lebUpdateSearchClearBtn();
            lebSearchInputElement.focus();
        }

        function lebUpdateSearchClearBtn() {
            if (lebSearchInputElement.value.length > 0) {
                lebClearBtn.classList.add('leb-search-clear-visible');
            } else {
                lebClearBtn.classList.remove('leb-search-clear-visible');
            }
        }

        lebSearchInputElement.addEventListener('input', function () {
            lebUpdateSearchClearBtn();
        });

        lebSearchInputElement.addEventListener('focus', function () {
            lebWrapper.classList.add('leb-search-focused');
        });

        lebSearchInputElement.addEventListener('blur', function () {
            lebWrapper.classList.remove('leb-search-focused');
        });

        document.addEventListener('keydown', function (lebEvent) {
            if (lebEvent.key === 'Escape') {
                lebClearSearch();
            }
        });
    </script>

</body>

</html>
